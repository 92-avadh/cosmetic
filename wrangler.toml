name = "cosmetic-web"
main = ".open-next/worker.js"
assets = { directory = ".open-next/assets", binding = "ASSETS" }
compatibility_date = "2025-04-01"
compatibility_flags = [ "nodejs_compat" ]

# Environment variables — set these via `wrangler secret put <KEY>` or in Cloudflare Dashboard.
# Required: SUPABASE_URL, SUPABASE_ANON_KEY
# Optional: SESSION_SECRET, GMAIL_USER, GMAIL_APP_PASSWORD, RAZORPAY_API_KEY, RAZORPAY_SECRET, STRIPE_SECRET_KEY
